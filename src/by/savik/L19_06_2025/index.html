<!Doctype html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title> Карточка контакта</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <form action="/search" method="get">
        <label for="query">Поиск:</label>
        <input type="text" id="query" name="query" placeholder="строка поиска" class="input" required>

        <label for="type">Тип:</label>
        <select id="type" name="type" class="input">
            <option value="fruit" selected>Фрукт</option>
            <option value="vegetable">Овощ</option>
            <option value="berry">Ягода</option>
        </select>

        <label for="color">Цвет:</label>
        <select id="color" name="color" class="input">
            <option value="red" selected>Красный</option>
            <option value="green">Зелёный</option>
            <option value="yellow">Жёлтый</option>
        </select>

        <label for="limit">Лимит</label>
        <input type="number" id="limit" name="limit" min="1" max="50" value="10">

        <input type="submit" value="Submit">
    </form>
</body>
</html>
